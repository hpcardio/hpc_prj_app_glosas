{% extends "base.html" %}
{% block page_title %}Conciliacao{% endblock %}
{% block content %}
<section class="panel">
  <form method="post" class="toolbar-form">
    {% csrf_token %}
    <button class="btn btn-primary">Executar conciliacao</button>
  </form>
  <table class="table table-hover align-middle">
    <thead><tr><th>Tipo</th><th>Referencia</th><th>Descricao</th></tr></thead>
    <tbody>
      {% for item in divergencias %}
      <tr><td>{{ item.tipo }}</td><td>{{ item.referencia }}</td><td>{{ item.descricao }}</td></tr>
      {% empty %}
      <tr><td colspan="3">Nenhuma divergencia encontrada.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
